# Blueprint Render — https://render.com/docs/blueprint-spec
# Cria o serviço: Dashboard → New → Blueprint → cola este repo.

services:
  - type: web
    name: novelaspt-stremio-addon
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /manifest.json
    # Opcional (Render já define RENDER=true → timeouts mais longos, menos pedidos paralelos):
    # envVars:
    #   - key: STREMIO_NP_HTTP_TIMEOUT_MS
    #     value: "60000"
    #   - key: STREMIO_NP_ARCHIVE_CONCURRENCY
    #     value: "2"
    #   - key: STREMIO_NP_SYNOPSIS_CONCURRENCY
    #     value: "3"
