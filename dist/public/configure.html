<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configurar Addon</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 32px auto; padding: 0 16px; }
    code { background: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Filmes, Series e Novelas Portuguesas</h1>
  <p>Usa este URL no Stremio:</p>
  <p><code id="m"></code></p>
  <p>Se usares Stremio Web/TV, coloca um URL HTTPS publico.</p>
  <script>
    document.getElementById('m').textContent = location.origin + '/manifest.json';
  </script>
</body>
</html>
